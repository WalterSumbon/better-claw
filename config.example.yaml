# ============================================================================
# Better-Claw 配置文件
# ============================================================================
#
# 所有字段都有默认值，最小配置为空文件即可启动。
# 复制此文件到 <data-dir>/config.yaml 并根据需要修改。
#
# 配置优先级：CLI 参数 > 配置文件 > 默认值
# ============================================================================

# ----------------------------------------------------------------------------
# 自定义 System Prompt 注入
# ----------------------------------------------------------------------------
# 在 system prompt 中注入额外的指令或说明内容。
# 支持字符串或字符串数组，每个条目作为独立段落注入（位于 core memory 之前）。
# 适合添加全局行为指令、角色补充说明、业务规则等。
# 支持热重载（修改后下次对话立即生效，无需重启）。
#
# 支持路径变量展开（与权限配置中的变量一致）：
#   ${userDir}       — 当前用户的数据目录
#   ${userWorkspace} — 当前用户的 workspace
#   ${dataDir}       — 全局数据目录
#   ${home}          — 系统用户主目录
#   ${configFile}    — 配置文件路径
#
# 字符串形式：
# systemPrompt: |
#   ## 额外指令
#   你是一个专注于金融领域的助手，回答问题时优先考虑合规性。
#   所有涉及投资建议的回复都必须包含风险提示。
#   用户的数据目录在 ${userDir}。
#
# 数组形式（多个独立段落）：
# systemPrompt:
#   - |
#     ## 角色补充
#     你同时也是一名资深的 Python 开发者。
#   - |
#     ## 业务规则
#     用户提到"发布"时，始终先检查 CI 是否通过。

# ----------------------------------------------------------------------------
# Anthropic API 配置
# ----------------------------------------------------------------------------
# agent-sdk 可复用 Claude CLI 的认证信息，通常不需要手动配置 apiKey。
# 仅在无法使用 CLI 认证或需要连接代理服务器时才需要配置。
anthropic:
  # API Key（可选）。
  # 如果已通过 `claude login` 登录 CLI，则无需配置。
  # apiKey: "sk-ant-your-api-key-here"

  # Auth Token（可选）。
  # 用于代理服务器认证，对应环境变量 ANTHROPIC_AUTH_TOKEN。
  # authToken: "your-auth-token-here"

  # Base URL（可选）。
  # 用于连接代理服务器或自定义 API 端点，对应环境变量 ANTHROPIC_BASE_URL。
  # baseUrl: "https://api.anthropic.com"

  # 默认模型 ID。
  # 可选值：claude-opus-4-6, claude-sonnet-4-6, claude-haiku-4-5-20251001 等。
  # 默认值："claude-opus-4-6"
  model: "claude-opus-4-6"

  # 单次查询最大预算（美元，可选）。
  # 超过此预算时查询会被终止。不设置则不限制。
  # maxBudgetUsd: 10.0

# ----------------------------------------------------------------------------
# Telegram 机器人配置（可选）
# ----------------------------------------------------------------------------
# 不配置此段则不启动 Telegram 适配器。
# telegram:
#   # Bot Token（必填）。从 Telegram @BotFather 获取。
#   botToken: "123456789:AABBccDDeeFFggHHiiJJkkLLmmNNooPPqqR"
#
#   # HTTP 代理地址（可选）。用于网络受限环境。
#   # proxy: "http://127.0.0.1:7890"
#
#   # 命令前缀（可选）。用于识别命令消息（如 /new、/stop）。
#   # 默认值："/"
#   # commandPrefix: "/"

# ----------------------------------------------------------------------------
# 钉钉机器人配置（可选）
# ----------------------------------------------------------------------------
# 不配置此段则不启动钉钉适配器。
# 需要在钉钉开放平台创建企业内部应用，启用机器人能力并选择 Stream 模式。
# dingtalk:
#   # AppKey / ClientID（必填）。从钉钉开放平台应用凭证页获取。
#   clientId: "your-app-key"
#
#   # AppSecret / ClientSecret（必填）。从钉钉开放平台应用凭证页获取。
#   clientSecret: "your-app-secret"
#
#   # robotCode（可选）。用于主动发消息 API，不填时默认使用 clientId。
#   # robotCode: "your-robot-code"
#
#   # 以下为企业定制版钉钉（如蚂蚁钉）的 API 地址配置，标准钉钉无需修改。
#   # apiBase: "https://api.dingtalk.com"
#   # oapiBase: "https://oapi.dingtalk.com"
#
#   # 命令前缀（可选）。用于识别命令消息（如 .new、.stop）。
#   # 钉钉会拦截 "/" 开头的消息，因此默认使用 "."。
#   # 默认值："."
#   # commandPrefix: "."

# ----------------------------------------------------------------------------
# 日志配置
# ----------------------------------------------------------------------------
logging:
  # 日志级别。
  # 可选值：trace, debug, info, warn, error, fatal
  # 默认值："info"
  level: "info"

  # 日志文件目录。相对路径基于 dataDir 解析。
  # 默认值："logs"
  directory: "logs"

  # 单个日志文件最大体积（pino-roll 格式：数字 + 单位）。
  # 单位：k（KB）、m（MB）、g（GB）。
  # 默认值："10m"
  maxSize: "10m"

  # 保留的日志轮转文件数量。超过后自动删除最旧的文件。
  # 默认值：10
  maxFiles: 10

  # Bot 回复日志的最大显示长度（字符数）。超过则在日志中显示为摘要。
  # 默认值：200
  replyLogMaxLength: 200

# ----------------------------------------------------------------------------
# 消息推送粒度配置
# ----------------------------------------------------------------------------
# 控制 agent 处理过程中向用户推送哪些中间信息。
messagePush:
  # 是否推送 assistant 中间文本消息（agent 思考过程中的阶段性回复）。
  # 启用后用户可以看到 agent 的中间思考结果，降低等待焦虑。
  # 默认值：true
  pushIntermediateMessages: true

  # 消息交互模式。
  # 可选值：
  #   - "queue"：排队模式（默认）。消息按顺序串行处理，
  #     必须等前一条消息的 agent 完全响应后再处理下一条。
  #   - "interrupt"：中断模式。当用户的新消息到达时，如果 agent 仍在处理之前的消息，
  #     立即中断当前处理（保留已有的中间对话上下文），
  #     然后将所有积压消息合并为一条，一起发给 agent 处理。
  #     适合需要快速响应最新意图的场景。
  # 默认值："queue"
  interactionMode: "queue"


# ----------------------------------------------------------------------------
# 数据目录路径
# ----------------------------------------------------------------------------
# 存放用户数据、会话记录、日志等所有运行时数据的根目录。
# CLI --data-dir 参数优先级更高。
# 默认值："data"
dataDir: "data"

# ----------------------------------------------------------------------------
# Agent 权限模式
# ----------------------------------------------------------------------------
# 控制 agent 执行文件操作和 shell 命令时的权限策略。
# 可选值：
#   - "default"：结合 permissions 配置进行路径级权限检查（推荐多用户环境）
#   - "acceptEdits"：自动允许文件编辑，shell 命令仍需确认
#   - "bypassPermissions"：跳过所有权限检查（最方便，适合私有部署）
# 默认值："default"
permissionMode: "default"

# ----------------------------------------------------------------------------
# 文件系统权限隔离配置
# ----------------------------------------------------------------------------
# 多用户环境下的文件系统访问控制。通过「权限组」和「工作组」两个维度隔离用户。
#
# ── 核心概念 ──
#
# 权限组（Permission Group）：
#   - 每个用户属于且仅属于一个权限组（通过 profile.permissionGroup 指定，或使用 defaultGroup）。
#   - 每组的 filesystem 配置直接映射 SDK sandbox 的三个文件系统数组。
#   - 支持 inherits 继承另一个组的规则（默认继承 admin）。
#   - 子组的配置追加在父组之后（数组合并）。
#
# SDK Sandbox Filesystem 模型：
#
#   allowWrite（写入白名单）：
#     - 指定后进入白名单模式：写入默认拒绝，仅列出的路径可写。
#     - 未指定时写入默认允许。
#
#   denyWrite（写入黑名单）：
#     - 进一步限制写入，优先级高于 allowWrite。
#     - 可在 allowWrite 允许的目录下"挖掉"特定子路径的写权限。
#
#   denyRead（读取黑名单）：
#     - 禁止读取。SDK 无 allowRead 机制——
#       一旦父路径被 deny，子路径无法在 sandbox 层面豁免。
#
# 工作组（Work Group）：
#   - 用于跨用户协作，共享一个 workspace 目录。
#   - 成员以 "rw"（读写）或 "r"（只读）权限加入。
#   - rw 成员的工作组 workspace 自动追加到 allowWrite。
#   - 一个用户可以同时属于多个工作组。
#
# 路径变量（运行时自动替换为绝对路径）：
#   ${userWorkspace} — 当前用户的 workspace
#   ${userDir}       — 当前用户的数据目录
#   ${dataDir}       — 全局数据目录
#   ${home}          — 系统用户主目录
#   ${configFile}    — 配置文件路径（未从文件加载时自动跳过该条目）
#   ${otherUserDir}  — 展开为所有其他用户的目录（每个用户一条路径）
#
# ── 双层隔离 ──
#
#   1. canUseTool 回调 — 对 Read/Write/Edit/Glob/Grep 等内置工具做路径级检查。
#   2. Sandbox（OS 级）— 对 Bash 命令做进程级沙箱隔离。
#   两层使用相同的 allowWrite / denyWrite / denyRead 配置。
#
permissions:
  # --------------------------------------------------------------------------
  # 权限组定义
  # --------------------------------------------------------------------------
  # 每个键是组名，值是该组的配置。
  #
  # 组配置字段：
  #   inherits:   继承的父组名（可选，默认 "admin"）。
  #   filesystem:  文件系统访问规则（可选，直接映射 SDK sandbox）。
  #     allowWrite: 写入白名单路径列表（指定后写入变为白名单模式）。
  #     denyWrite:  写入黑名单路径列表（优先级高于 allowWrite）。
  #     denyRead:   读取黑名单路径列表。
  #
  groups:
    # 管理员组：无 filesystem = 完全可读可写，所有权限组的默认继承源。
    admin: {}

    # 普通用户组：
    #   从 admin 继承（完全可读可写），然后通过 filesystem 收紧：
    #
    #   allowWrite:
    #     - ${userDir}/memory    — memory 目录可写
    #     - ${userWorkspace}     — workspace 可写
    #     （其余路径在 allowWrite 白名单模式下默认拒绝写入）
    #
    #   denyRead:
    #     - ${otherUserDir}      — 禁止读取其他用户的目录
    #
    #   最终效果（userDir 下各路径）：
    #     profile.json              → 只读
    #     session.json / sessions/  → 只读
    #     cumulative-summary.json   → 只读
    #     crons.json                → 只读
    #     memory/                   → 可读可写（在 allowWrite 中）
    #     workspace/                → 可读可写（在 allowWrite 中）
    #     其他用户目录              → 不可读不可写
    user:
      # inherits: "admin"  # 可省略，默认就是 admin
      filesystem:
        allowWrite:
          - "${userDir}/memory"
          - "${userWorkspace}"
        denyRead:
          - "${otherUserDir}"

    # ── 自定义权限组示例 ──

    # 开发者组：继承 user 的 filesystem，再额外开放 /opt/projects 的写入。
    # developer:
    #   inherits: "user"
    #   filesystem:
    #     allowWrite:
    #       - "/opt/projects"

    # 访客组：只能读自己的 workspace，不能写任何地方。
    # guest:
    #   filesystem:
    #     denyRead:
    #       - "${otherUserDir}"
    #     denyWrite:
    #       - "${otherUserDir}"
    #     # 不设 allowWrite → 写入默认允许，但配合其他限制…
    #     # 如需完全禁写，可用 protectedPaths 或在业务层控制。

  # --------------------------------------------------------------------------
  # 工作组定义（可选）
  # --------------------------------------------------------------------------
  # 每个工作组拥有一个共享 workspace：<dataDir>/workgroups/<groupName>/workspace/
  # 目录会在首次访问时自动创建。
  # rw 成员的工作组 workspace 自动追加到 allowWrite。
  # 一个用户可以同时属于多个工作组。
  #
  # workGroups:
  #   team-alpha:
  #     members:
  #       user_abc123: "rw"    # 读写权限
  #       user_def456: "r"     # 只读权限
  #   team-beta:
  #     members:
  #       user_abc123: "r"
  #       user_ghi789: "rw"

  # --------------------------------------------------------------------------
  # 环境变量过滤（非 admin 用户）
  # --------------------------------------------------------------------------
  # 非 admin 用户默认继承所有环境变量。通过 envFilter 可按模式过滤掉敏感变量，
  # 通过 envExtra 可额外注入变量。
  # envFilter 支持 * 通配符（如 "SECRET_*" 匹配所有以 SECRET_ 开头的变量）。
  # SDK 必需的 Anthropic 变量始终从 anthropic 配置注入，不受过滤影响。
  # 默认值：[]（不过滤）
  # envFilter:
  #   - "ANTHROPIC_*"
  #   - "AWS_*"
  #   - "SECRET_*"

  # 额外注入的环境变量（键值对），在过滤之后追加。
  # 默认值：{}
  # envExtra:
  #   MY_VAR: "value"

  # --------------------------------------------------------------------------
  # 受保护路径（非 admin 用户自动追加 deny readwrite）
  # --------------------------------------------------------------------------
  # 列表中的路径会作为 deny readwrite 规则追加到规则链最末尾，
  # 不可被权限组或工作组规则覆盖。
  # 支持变量：${configFile}（配置文件路径）、${home}（系统主目录）、
  #           ${dataDir}、${userDir}、${userWorkspace}。
  # ${configFile} 在未加载配置文件时自动跳过。
  # 默认值：[]（空数组，不额外保护任何路径）。
  # 如需保护特定路径，可添加条目，例如：
  #   protectedPaths:
  #     - "${configFile}"
  #     - "${home}/.claude"
  protectedPaths: []

  # 默认权限组
  # --------------------------------------------------------------------------
  # 用户 profile 中未指定 permissionGroup 时使用此组。
  # 默认值："user"
  defaultGroup: "user"

# ----------------------------------------------------------------------------
# 会话管理配置
# ----------------------------------------------------------------------------
# 控制对话会话的自动轮转策略和摘要生成行为。
# 当对话过长或间隔过久时，系统会自动归档当前会话并创建新会话，
# 同时生成摘要保留长期记忆。
session:
  # 时间间隔轮转阈值（小时）。
  # 用户最后一条消息距今超过此时间后，下次对话自动开启新会话。
  # 默认值：4
  rotationTimeoutHours: 4

  # Context 占比软轮转阈值（0-1）。
  # 当上下文 token 数占模型 context window 的比例达到此值时，
  # 在后台异步启动 summary 生成和会话浓缩，不阻塞当前消息处理。
  # 默认值：0.5
  rotationContextRatio: 0.5

  # Context 占比强制轮转阈值（0-1）。
  # 当上下文比例超过此值时，同步等待轮转完成后才处理下一条消息。
  # 必须大于 rotationContextRatio。
  # 默认值：0.7
  rotationForceRatio: 0.7

  # 轮转时是否生成 AI 摘要。
  # 启用后会在会话归档时自动生成对话摘要，用于后续会话的上下文衔接。
  # 默认值：true
  summaryEnabled: true

  # 摘要生成使用的模型。
  # 推荐使用较便宜的模型以降低成本，摘要任务不需要最强模型。
  # 默认值："claude-haiku-4-5-20251001"
  summaryModel: "claude-haiku-4-5-20251001"

  # 摘要生成时每个分块的最大字符数。
  # 对话总长度超过此值时自动分块（map-reduce），每块独立摘要后合并。
  # 默认值：80000（约 20k tokens），适用于 haiku 的 200k context window。
  summaryChunkMaxChars: 80000

  # system prompt 中展示的最近 session 数量（短期记忆）。
  # 更早的 session 会被浓缩合并到累积摘要中（长期记忆）。
  # 默认值：3
  maxRecentSessions: 3

  # 轮转时从旧 session 携带到新 session 的最近对话轮次数。
  # 不论何种原因触发轮转（超时、context 过大、手动 /new），
  # 系统都会从旧 session 最后 N 轮对话中提取 carryover，
  # 以规则化 digest 方式注入新 session 的 system prompt，
  # 确保模型知道轮转前刚刚发生了什么。
  #
  # 每轮 = 1 条用户消息 + 该轮最后 1 条 agent 回复（agent 循环中的中间回复丢弃）。
  #
  # Digest 策略（节省 token）：
  #   - 用户消息：超过 carryoverUserMaxChars 字符则截断并注明总长度
  #   - Agent 回复：超过 headChars + tailChars 则只保留开头和结尾原文，中间省略
  #
  # Carryover 在新 session 中始终保留，直到该 session 本身轮转。
  # 设为 0 则不携带任何上下文。
  # 默认值：5
  carryoverTurns: 5

  # Carryover 中用户消息的最大字符数。超过则截断并注明总长度。
  # 用户消息通常较短，阈值可以高一些。
  # 默认值：500
  carryoverUserMaxChars: 500

  # Carryover 中 agent 回复保留的开头字符数。
  # 默认值：200
  carryoverAssistantHeadChars: 200

  # Carryover 中 agent 回复保留的结尾字符数。
  # 若回复总长度 ≤ headChars + tailChars，则保留全文不做 digest。
  # 默认值：200
  carryoverAssistantTailChars: 200

  # Carryover 是否包含完整的 tool call 和 tool result。
  # 启用后每轮 assistant 回复会附带完整的 tool_use（含输入参数）和 tool_result（含执行结果）块，
  # 帮助新 session 中的模型精确了解之前做了哪些操作及其结果。
  # 在 mid-query 轮转（agent loop 中途因 context 超限被中断+切换）场景下特别有用。
  # 注意：完整 tool result 可能较大，会增加 system prompt 体积。
  # 默认值：false
  carryoverIncludeToolCalls: false

  # 是否向用户推送 context 相关事件通知。
  # 开启后以下事件会向用户发送提示消息：
  #   - 自动轮转（timeout / max_context）
  #   - Soft 阈值触发（后台开始准备摘要）
  #   - Hard 阈值触发（mid-query 强制轮转）
  #   - SDK auto-compact
  # 默认值：false
  notifyContextEvents: false

# ----------------------------------------------------------------------------
# 重启权限配置
# ----------------------------------------------------------------------------
# 控制 agent 和用户分别是否可以触发服务重启。
restart:
  # 是否允许 agent（通过 MCP 工具）触发重启。
  # 设为 false 后 agent 将无法调用 restart 工具。
  # 默认值：true
  allowAgent: true

  # 是否允许用户（通过 /restart 命令）触发重启。
  # 设为 false 后所有用户的 /restart 命令都会被拒绝。
  # 默认值：true
  allowUser: true

  # 允许触发重启的用户 ID 白名单（仅在 allowUser 为 true 时生效）。
  # 为空数组时表示不限制，所有用户均可使用 /restart。
  # 填入用户 ID 后，仅白名单内的用户可以触发重启。
  # 默认值：[]（不限制）
  # userWhitelist:
  #   - "user_xxxxxxxx"       # 匹配特定用户
  #   - "@admin"              # 匹配 admin 权限组的所有用户

# ----------------------------------------------------------------------------
# Skill 系统配置
# ----------------------------------------------------------------------------
# 控制 agent 可用的 skill / skillset 搜索路径。
# 启动时会扫描所有路径，构建 skill 索引，顶层节点注入 system prompt。
# agent 通过 load_skillset MCP 工具按需加载和导航 skill 树。
#
# ── 目录结构约定 ──
#
# 每个 skill 路径下可以包含两种节点：
#
#   叶子节点（Skill）：包含 SKILL.md 的目录。
#     代表一个具体的 skill，agent 可直接加载使用。
#     SKILL.md 的 YAML frontmatter 必须包含 name 和 description。
#
#   中间节点（Skill Set）：包含 SKILLSET.md 的目录。
#     代表一个 skill 分类，用于组织和索引子节点。
#     SKILLSET.md 的 YAML frontmatter 必须包含 name 和 description。
#     子目录中可以嵌套更多 Skill 或 Skill Set。
#
# 同一目录不应同时包含 SKILL.md 和 SKILLSET.md。
#
# ── 示例结构 ──
#
#   skills/
#   ├── deep-learning/           ← Skill Set（含 SKILLSET.md）
#   │   ├── SKILLSET.md
#   │   ├── pytorch/             ← Skill（含 SKILL.md）
#   │   │   └── SKILL.md
#   │   └── transformers/        ← 嵌套 Skill Set
#   │       ├── SKILLSET.md
#   │       ├── fine-tuning/
#   │       │   └── SKILL.md
#   │       └── inference/
#   │           └── SKILL.md
#   └── finance/
#       ├── SKILLSET.md
#       ├── etf/
#       │   └── SKILL.md
#       └── options/
#           └── SKILL.md
#
# ── Frontmatter 格式 ──
#
#   ---
#   name: my-skill-name
#   description: 这个 skill 做什么的简要说明
#   ---
#
skills:
  # Skill 搜索路径列表。
  # 支持 ~ 展开为用户主目录。
  # 支持 ${userDir} 变量，运行时替换为当前用户的数据目录（<dataDir>/users/<userId>/）。
  # 从前到后扫描，同名节点以先发现的为准（即前面的路径优先级更高）。
  # 默认值：["~/.claude/skills", "./skills", "${userDir}/skills"]
  paths:
    - "~/.claude/skills"    # Claude Code 默认 skill 路径（兼容原生/第三方 skill）
    - "./skills"            # Better-Claw 项目内置 skill（全局共享）
    - "${userDir}/skills"   # 用户私有 skill（多用户模式下各用户独立安装和管理）

# ----------------------------------------------------------------------------
# 语音转文字配置（可选）
# ----------------------------------------------------------------------------
# 不配置此段时，语音消息仅保存音频文件，由 agent 自行决定如何处理
# （如通过外部 skill 或 MCP 工具转录）。
#
# providers 数组构成 fallback 链：按顺序依次尝试，前一个失败自动降级到下一个。
# 每个 provider 有独立的 type 和配置字段。language 为全局共享。
#
# 支持的引擎类型：
#   - whisper-cli：本地 OpenAI Whisper CLI，需安装 openai-whisper + ffmpeg。
#   - groq：Groq Cloud Whisper API，极速（通常 < 1 秒），无本地依赖。
#
# --- 方案 A：仅本地 Whisper CLI ---
# speechToText:
#   providers:
#     - type: "whisper-cli"
#       whisperPath: "whisper"          # 可执行文件路径，默认 "whisper"
#       model: "base"                   # tiny / base / small / medium / large
#   # language: "zh"                    # 可选，留空自动检测
#
# --- 方案 B：仅 Groq Cloud API ---
# speechToText:
#   providers:
#     - type: "groq"
#       apiKey: "gsk_xxxxxxxxxxxxxxxx"
#       model: "whisper-large-v3-turbo" # 默认值，可省略
#   # language: "zh"
#
# --- 方案 C：Groq 优先 + 本地 Whisper 兜底（推荐） ---
# speechToText:
#   providers:
#     - type: "groq"
#       apiKey: "gsk_xxxxxxxxxxxxxxxx"
#       model: "whisper-large-v3-turbo"
#     - type: "whisper-cli"
#       whisperPath: "whisper"
#       model: "base"
#   # language: "zh"

# ----------------------------------------------------------------------------
# 消息信封配置
# ----------------------------------------------------------------------------
# 在用户消息前附加平台来源和发送时间信息，帮助 agent 感知消息上下文。
# 格式示例：[telegram | 2026-03-10 09:43 Asia/Shanghai (UTC+8)]
# 时间使用用户 profile 中设置的时区（通过 user_profile 工具设置），
# 未设置时回退到系统时区。
# 默认开启，可在此处关闭。
#
# messageEnvelope:
#   # 是否启用消息信封。
#   # 默认值：true
#   enabled: true

# ----------------------------------------------------------------------------
# SDK 环境变量配置
# ----------------------------------------------------------------------------
# 传递给 SDK subprocess 的额外环境变量（键值对）。
# 对所有用户（包括 admin）全局生效，在 process.env 之后追加。
# 适合设置 SDK 行为参数，不影响 Anthropic 认证变量（后者始终从 anthropic 配置注入）。
# 支持热重载。
#
# sdkEnv:
#   # 调整 SDK 自动 compact 的触发阈值（1-100，百分比）。
#   # 默认约 75%。设为较高值可让 Better-Claw 的 session 轮转先于 compact 介入，
#   # 避免 compact 过程中可能出现的 SDK 流挂起问题。
#   CLAUDE_AUTOCOMPACT_PCT_OVERRIDE: "95"
#
#   # 其他 SDK 或工具链需要的环境变量。
#   MY_CUSTOM_VAR: "value"

# ----------------------------------------------------------------------------
# Webhook 配置（可选）
# ----------------------------------------------------------------------------
# 启用后会启动一个 HTTP 服务器，接收外部系统的通知请求。
# 可用于集成第三方系统（如交易系统、监控系统）向用户发送消息。
# 不配置此段则不启动 Webhook 服务器。
#
# API 端点：POST /api/webhook/notify
#
# 请求参数（JSON）：
#   - userId (必填)：目标用户 ID
#   - platform (可选)：目标平台（telegram/dingtalk），默认用户最后绑定的平台
#   - message (与 prompt 二选一)：直接发送的消息内容（不经过 Agent）
#   - prompt (与 message 二选一)：Agent prompt（经过 AI 处理后回复）
#   - data (可选)：附加数据，注入到 prompt 上下文
#
# 示例请求：
#   curl -X POST http://localhost:3000/api/webhook/notify \
#     -H "Content-Type: application/json" \
#     -H "X-API-Key: your-secret-key" \
#     -d '{"userId": "user_xxx", "message": "Hello from webhook!"}'
#
# webhook:
#   # 监听端口。
#   # 默认值：3000
#   port: 3000
#
#   # API 密钥（用于验证请求）。
#   # 请求时需在 Header 中携带 X-API-Key: <apiKey>。
#   # 留空则不验证（仅限内网部署时使用）。
#   # apiKey: "your-secret-key"

# ----------------------------------------------------------------------------
# AgentElegram 配置（可选）
# ----------------------------------------------------------------------------
# AgentElegram 是一个从底层专为 Agent/MultiAgent 设计的聊天平台。
# 配置此段后会启动 AgentElegram 适配器，通过 WebSocket 连接到 AgentElegram 服务器。
# 不配置此段则不启动 AgentElegram 适配器。
#
# agentelegram:
#   # AgentElegram 服务器 WebSocket 地址（必填）。
#   # 默认值："ws://localhost:4000/ws"
#   serverUrl: "ws://localhost:4000/ws"
#
#   # Agent API Key（必填）。由 AgentElegram 的 register-agent 接口颁发（格式：ag-xxx）。
#   apiKey: "ag-your-agent-api-key"
#
#   # 命令前缀（可选）。用于识别命令消息（如 /new、/stop）。
#   # 默认值："/"
#   # commandPrefix: "/"
#
#   # 断线重连间隔（毫秒）。连接断开后等待此时间再尝试重连。
#   # 默认值：5000
#   # reconnectInterval: 5000

# ============================================================================
# Per-User MCP Servers（非配置文件项，仅供参考）
# ============================================================================
#
# 每个用户可以在自己的数据目录下创建 mcp-servers.json 文件来安装私有 MCP servers：
#
#   <dataDir>/users/<userId>/mcp-servers.json
#
# 格式与 Claude Code settings.json 中的 mcpServers 段相同：
#
#   {
#     "my-db": {
#       "type": "stdio",
#       "command": "npx",
#       "args": ["-y", "@modelcontextprotocol/server-sqlite", "/path/to/db"]
#     },
#     "my-api": {
#       "type": "http",
#       "url": "http://localhost:3001/mcp"
#     }
#   }
#
# 特性：
#   - 热加载：修改文件后下条消息立即生效，无需重启。
#   - 用户隔离：每个用户只能看到和使用自己安装的 MCP servers。
#   - 优先级：per-user > project/local settings > 内置 better-claw。
#     同名 server 后加载的覆盖先加载的。
